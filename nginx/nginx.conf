server {
    listen 3000;
    server_name localhost;
 
    # Para la ruta con contexto /portafolio
    location /visor_docs_nafin/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /visor_docs_nafin/index.html;
    }
 
    # Para la ruta raíz (mantener si también quieres acceso sin contexto)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
 
    # Para archivos estáticos
    location /static/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Archivos estáticos para el contexto
    location /visor_docs_nafin/static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
 
    # Headers CORS
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
    add_header Access-Control-Allow-Headers 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
}